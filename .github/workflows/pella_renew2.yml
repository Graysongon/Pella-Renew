name: Pella Auto Renew (cuty)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时跑一次（可改）

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: |
          npm install
          npx playwright install --with-deps

      - name: 🖥️ Install xdotool (for CF click fallback)
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool xvfb

      - name: 🚀 Run Script (with virtual display)
        env:
          PELLA_ACCOUNT: ${{ secrets.PELLA_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          npx playwright test tests/pella_renew.spec.js --timeout=120000

      - name: 📸 Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            test-results
